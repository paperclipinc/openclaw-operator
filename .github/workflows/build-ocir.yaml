name: Build and Push to OCIR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., v0.36.5-oke4)'
        required: true
        default: 'v0.36.5-oke4'

env:
  OCIR_REGION: gru.ocir.io
  OCIR_REPO: grsq0nuhtlep/openclaw-operator

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.OCIR_REGION }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.OCIR_REGION }}/${{ env.OCIR_REPO }}:${{ inputs.tag }}
            ${{ env.OCIR_REGION }}/${{ env.OCIR_REPO }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
