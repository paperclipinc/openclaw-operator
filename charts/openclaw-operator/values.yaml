# OpenClaw Operator Helm Values

# Number of replicas for the operator
replicaCount: 1

# Operator image configuration
image:
  repository: ghcr.io/openclaw-rocks/openclaw-operator
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ServiceAccount configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

# Node selector for pod scheduling
nodeSelector: {}

# Tolerations for pod scheduling
tolerations: []

# Affinity rules for pod scheduling
affinity: {}

# Log level for the operator (passed as --zap-log-level). Valid values: debug, info, error, or an integer (0=info, 1=debug).
logLevel: info

# Leader election configuration
leaderElection:
  enabled: true
  resourceName: openclaw-operator-leader-election

# Metrics configuration
metrics:
  enabled: true
  bindAddress: ":8443"
  secure: true
  # Service for operator metrics endpoint
  service:
    port: 8443
    annotations: {}
  # ServiceMonitor for Prometheus Operator scraping
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

# OTLP metrics export configuration (operator-level metrics).
# Bridges all Prometheus metrics to an OTLP-compatible backend via gRPC.
# Both Prometheus scraping and OTLP push can be active simultaneously.
otlp:
  enabled: false
  endpoint: ""  # e.g. "otel-collector.observability.svc:4317"
  insecure: true

# Webhook configuration (optional)
webhook:
  enabled: false
  port: 9443
  certManager:
    enabled: true
    issuerRef:
      name: ""
      kind: ""

# Network policy for the operator
networkPolicy:
  enabled: true

# CRD installation
crds:
  install: true
  keep: true  # Keep CRDs when uninstalling the chart

# RBAC for the operator Deployment ServiceAccount
rbac:
  # When false, the chart does not render manager, leader-election, or metrics RBAC.
  # Supply your own Roles or ClusterRoles and align watchNamespaces with the manager cache.
  create: true
  # When true, use a Role (+RoleBinding) per watchNamespaces entry for workload APIs and
  # a minimal ClusterRole (+ClusterRoleBinding) only for openclawclusterdefaults get/list/watch.
  # When false, use a single ClusterRole with all rules (legacy behavior).
  namespaced: false
  # Namespaces where OpenClawInstance and managed resources live (namespaced mode only).
  # If empty while namespaced is true, defaults to the chart release namespace.
  watchNamespaces: []
