{{- if .Values.rbac.create }}
{{- $watchCsv := "" }}
{{- if .Values.rbac.namespaced }}
{{- $l := .Values.rbac.watchNamespaces | default list }}
{{- if empty $l }}
{{- $watchCsv = .Release.Namespace }}
{{- else }}
{{- $watchCsv = join "," $l }}
{{- end }}
{{- end }}
{{- if not .Values.rbac.namespaced }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openclaw-operator.fullname" . }}-manager-role
  labels:
    {{- include "openclaw-operator.labels" . | nindent 4 }}
rules:
{{- include "openclaw-operator.managerRoleRulesWithoutClusterDefaults" . | nindent 2 }}
{{- include "openclaw-operator.clusterDefaultsReaderRules" . | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openclaw-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "openclaw-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openclaw-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "openclaw-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openclaw-operator.fullname" . }}-clusterdefaults-reader
  labels:
    {{- include "openclaw-operator.labels" . | nindent 4 }}
rules:
{{- include "openclaw-operator.clusterDefaultsReaderRules" . | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openclaw-operator.fullname" . }}-clusterdefaults-reader-binding
  labels:
    {{- include "openclaw-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openclaw-operator.fullname" . }}-clusterdefaults-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "openclaw-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- range $_, $ns := splitList "," $watchCsv }}
{{- $nsTrim := trim $ns }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openclaw-operator.fullname" $ }}-manager-role
  namespace: {{ $nsTrim }}
  labels:
    {{- include "openclaw-operator.labels" $ | nindent 4 }}
rules:
{{- include "openclaw-operator.managerRoleRulesWithoutClusterDefaults" $ | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openclaw-operator.fullname" $ }}-manager-rolebinding
  namespace: {{ $nsTrim }}
  labels:
    {{- include "openclaw-operator.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "openclaw-operator.fullname" $ }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "openclaw-operator.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
{{- if .Values.leaderElection.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openclaw-operator.fullname" . }}-leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openclaw-operator.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "openclaw-operator.fullname" . }}-leader-election-role
subjects:
  - kind: ServiceAccount
    name: {{ include "openclaw-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
